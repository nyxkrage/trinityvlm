#!/home/carsten/trinity-vlm/scripts/train_fsdp2.py

[model]
trinity_model = "arcee-ai/Trinity-Nano-Preview"
moondream_model = "moondream/moondream3-preview"
projector_hidden_dim = 2048
local_files_only = true

[data]
dataset = "anthracite-org/pixmo-cap-images"
split = "train"
prompt_text = "Describe the image in detail."
user_message_template = "{image}\n{prompt}"
max_prompt_tokens = 48
max_caption_tokens = 128
max_chat_input_tokens = 1536
max_chat_output_tokens = 384
max_seq_len = 2048
packing_buffer_size = 2
shuffle_buffer_size = 32
streaming = true
cache_shards_locally = true
local_files_only = false
shard_start = 0
shard_end = 72
caption_mix_weight = 0.5
chat_mix_weight = 0.0
chat_with_irrelevant_image_mix_weight = 0.5
chat_dataset = "nvidia/Llama-Nemotron-Post-Training-Dataset"
chat_dataset_config_name = "SFT"
chat_split = "chat"

[validation]
enabled = true
every = 50
max_batches = 4
shuffle_buffer_size = 0
streaming = true
packing_buffer_size = 2
cache_shards_locally = true
local_files_only = false
shard_start = 72
shard_end = 75
caption_mix_weight = 1.0
chat_mix_weight = 0.0
chat_with_irrelevant_image_mix_weight = 0.0

[wandb]
enabled = true
project = "trinity-vlm"
name = "bridge-mix-pixmo-nemotron"
mode = "offline"
tags = ["bridge", "fsdp2", "pixmo", "nemotron", "irrelevant-image", "grounded-only", "offline"]

[train]
output_dir = "checkpoints/bridge-mix-pixmo-nemotron"
max_steps = 10000
grad_accum_steps = 4
learning_rate = 0.0002
weight_decay = 0.01
warmup_steps = 100
max_grad_norm = 1.0
dtype = "bfloat16"
device = "cuda"
seed = 0
log_every = 1
activation_checkpointing = true
torch_compile = true
tf32 = true

[unfreeze]
train_vision = false
train_trinity = false
train_lm_head = false
unfreeze_last_n_layers = 0

[fsdp]
enabled = true
reshard_after_forward = true
param_dtype = "bfloat16"
reduce_dtype = "float32"
cast_forward_inputs = true
cpu_offload = false

[distributed]
nproc_per_node = 2
nnodes = 1
node_rank = 0
master_addr = "127.0.0.1"
master_port = 29518
backend = "nccl"

[checkpoint]
save_every = 250
