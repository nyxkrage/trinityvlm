#!/home/carsten/trinity-vlm/scripts/train_fsdp2.py

[model]
trinity_model = "arcee-ai/Trinity-Nano-Preview"
moondream_model = "moondream/moondream3-preview"
projector_hidden_dim = 2048
local_files_only = true

[data]
dataset = "anthracite-org/pixmo-cap-images"
split = "train"
cap_qa_dataset = "anthracite-org/pixmo-cap-qa-images"
cap_qa_split = "train"
point_explanations_dataset = "anthracite-org/pixmo-point-explanations-images"
point_explanations_split = "train"
prompt_text = "Describe the image in detail."
user_message_template = "{image}\n{prompt}"
max_prompt_tokens = 48
max_caption_tokens = 128
max_chat_input_tokens = 1536
max_chat_output_tokens = 384
max_seq_len = 4096
packing_buffer_size = 2
shuffle_buffer_size = 32
limit = 64
streaming = false
cache_shards_locally = true
local_files_only = true
shard_start = 0
shard_end = 33
caption_mix_weight = 0.2
cap_qa_mix_weight = 0.3
chat_mix_weight = 0.0
chat_with_irrelevant_image_mix_weight = 0.25
point_explanations_mix_weight = 0.25
chat_dataset = "nvidia/Llama-Nemotron-Post-Training-Dataset"
chat_dataset_config_name = "SFT"
chat_split = "chat"
chat_local_path = "prepared_data/nemotron_chat_train_local.jsonl"

[validation]
enabled = false

[wandb]
enabled = false

[profiling]
enabled = true
synchronize_cuda = true

[train]
output_dir = "checkpoints/bench-mix-seq4096-mb2-muon-baseline"
max_steps = 2
grad_accum_steps = 8
optimizer = "muon"
learning_rate = 0.0002
weight_decay = 0.01
muon_momentum = 0.95
muon_nesterov = true
muon_ns_steps = 5
muon_adjust_lr_fn = "match_rms_adamw"
warmup_steps = 100
max_grad_norm = 1.0
dtype = "bfloat16"
device = "cuda"
seed = 0
log_every = 1
activation_checkpointing = true
torch_compile = false
tf32 = true

[unfreeze]
train_vision = false
train_trinity = false
train_lm_head = false
unfreeze_last_n_layers = 0

[fsdp]
enabled = true
reshard_after_forward = true
param_dtype = "bfloat16"
reduce_dtype = "float32"
cast_forward_inputs = true
cpu_offload = false

[distributed]
nproc_per_node = 2
nnodes = 1
node_rank = 0
master_addr = "127.0.0.1"
master_port = 29531
backend = "nccl"

[checkpoint]
save_every = 0
resume_from = ""
